name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, ticket-service]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and run tests
        run: mvn -B verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-surefire-reports
          path: ${{ matrix.service }}/target/surefire-reports

  docker:
    name: Docker build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [auth-service, ticket-service]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t helpdesk-${{ matrix.service }}:${{ github.sha }} ${{ matrix.service }}
