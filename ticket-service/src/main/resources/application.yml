spring:
  application:
    name: ticket-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticket_db}
    username: ${SPRING_DATASOURCE_USERNAME:helpdesk}
    password: ${SPRING_DATASOURCE_PASSWORD:helpdesk}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-32-bytes-min!}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
