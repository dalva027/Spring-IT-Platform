spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:helpdesk}
    password: ${SPRING_DATASOURCE_PASSWORD:helpdesk}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-32-bytes-min!}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  seed-admin:
    enabled: ${SEED_ADMIN_ENABLED:true}
    email: ${SEED_ADMIN_EMAIL:admin@helpdesk.local}
    password: ${SEED_ADMIN_PASSWORD:ChangeMe123!}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
